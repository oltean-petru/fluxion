<section class="rounded-xl border border-line bg-surface">
  <header class="flex flex-wrap items-center justify-between gap-3 border-b border-line px-4 py-3">
    <div>
      <h2 class="text-2xl font-semibold text-ink">{{ heading }}</h2>
      @if (subtitle) {
        <p class="mt-1 text-sm text-ink-subtle">{{ subtitle }}</p>
      }
    </div>

    <ng-content select="[section-actions]"></ng-content>
  </header>

  <div class="p-4">
    <ng-content></ng-content>
  </div>
</section>
