<div class="flex flex-col w-screen h-screen overflow-hidden bg-surface">
  <!-- Top Nav -->
  <header class="relative z-50 flex items-center justify-between h-16 px-6 border-b bg-surface border-line shrink-0">
    <div class="flex items-center w-full gap-4">
      <div class="flex items-center gap-2 shrink-0">
          <img src="/Logo.svg" alt="Fluxion logo" class="h-8" />
      </div>
      <div class="flex-1 max-w-lg ml-6">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <svg class="w-4 h-4 text-ink-subtle" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </span>
          <input
            type="text"
            class="block w-full py-2 pl-10 border rounded-lg pr-9 border-line bg-secondary text-ink placeholder-ink-subtle focus:bg-secondary focus:outline-none focus:ring-1 focus:ring-brand-soft focus:border-brand sm:text-sm"
            placeholder="Search.."
            [value]="searchQuery()"
            (input)="onSearchInput($event)"
          >
          @if (searchQuery()) {
            <button
              type="button"
              class="absolute inset-y-0 right-0 flex items-center pr-3 transition-colors text-ink-subtle hover:text-ink-body"
              (click)="clearSearchQuery()"
              aria-label="Clear search"
            >
              <span class="material-icons text-[18px] leading-none" aria-hidden="true">close</span>
            </button>
          }
        </div>
      </div>
    </div>
    <div class="flex items-center gap-4 shrink-0">
      <button class="text-ink-subtle hover:text-ink-body">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </button>
      <button class="relative text-ink-subtle hover:text-ink-body">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
      </button>
      <div class="flex items-center justify-center w-8 h-8 text-xs font-medium rounded-full text-ink-body bg-ternary">
        PH
      </div>
    </div>
  </header>

  <!-- Main layout area -->
  <div class="relative flex flex-1 min-h-0 overflow-hidden">

    <!-- Sidebar Placeholder for Width (keeps content from going under the closed menu) -->
    <div class="w-16 h-full border-r bg-surface border-line shrink-0"></div>

    <!-- The actual side menu component (absolute positioning allows it to hover over content) -->
    <app-side-menu class="absolute top-0 left-0 h-full z-60"></app-side-menu>

    <!-- Page Content -->
    <main class="flex-1 min-w-0 min-h-0 overflow-auto bg-secondary">
      <div class="w-full min-h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
